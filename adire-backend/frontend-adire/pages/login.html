<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FAEBD7 100%);
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(139, 0, 0, 0.1);
        }

        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-box img {
            max-width: 150px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #8B0000 !important;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #8B0000;
            background: #FFF8F0;
        }

        .btn-gold {
            background: linear-gradient(135deg, #8B0000 0%, #A52A2A 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 0, 0, 0.4);
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }

        .signin-link {
            color: #8B0000;
            font-weight: 700;
            text-decoration: none;
        }

        .signin-link:hover {
            text-decoration: underline;
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-box">
                <h1
                    style="font-family: 'Playfair Display', serif; font-size: 36px; color: #D4AF37; font-style: italic; margin-bottom: 5px;">
                    Eury Textiles</h1>
                <p style="color: #666; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">Premium Adire
                    Collection</p>
            </div>
            <h2 class="text-center mb-2">Welcome Back</h2>

            <div id="error-box" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-gold mb-1" style="width: 100%">Sign In</button>
                <p class="text-center" style="color: #666; font-size: 0.9rem; margin-top: 20px;">
                    Don't have an account? <a href="register.html" class="signin-link">Create Account</a>
                </p>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const loginForm = document.getElementById('login-form');
        const errorBox = document.getElementById('error-box');

        // Admin email from backend (hardcoded to match .env)
        const ADMIN_EMAIL = 'adireboutique.noreply@gmail.com';

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            errorBox.style.display = 'none';

            try {
                const btn = e.target.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = 'Signing in...';
                btn.disabled = true;

                // Check if this is admin login
                if (email === ADMIN_EMAIL) {
                    // Try admin login
                    try {
                        const res = await api.post('/admin/login', { email, password });
                        // Store admin token for Bearer auth
                        localStorage.setItem('admin_token', password);
                        window.location.href = 'admin-dashboard.html';
                        return;
                    } catch (adminErr) {
                        // Admin login failed, show error
                        throw new Error('Invalid admin credentials');
                    }
                } else {
                    // Regular user login
                    const res = await auth.login(email, password);
                    window.location.href = 'user-dashboard.html';
                }
            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.style.display = 'block';
                const btn = e.target.querySelector('button');
                btn.innerText = 'Login';
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
