<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FAEBD7 100%);
            font-family: 'Inter', sans-serif;
        }

        .register-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(75, 0, 130, 0.1);
        }

        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-box img {
            max-width: 150px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #4B0082 !important;
            font-size: 28px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #4B0082;
            background: #FFF8F0;
        }

        .btn-gold {
            background: linear-gradient(135deg, #4B0082 0%, #6A0DAD 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(75, 0, 130, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(75, 0, 130, 0.4);
        }

        .verification-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }

        .v-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
            text-align: center;
        }

        .signin-link {
            color: #4B0082;
            font-weight: 700;
            text-decoration: none;
        }

        .signin-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="register-container">
        <div class="register-card">
            <div class="logo-box">
                <h1
                    style="font-family: 'Playfair Display', serif; font-size: 36px; color: #D4AF37; font-style: italic; margin-bottom: 5px;">
                    Eury Textiles</h1>
                <p style="color: #666; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">Premium Adire
                    Collection</p>
            </div>
            <h2 class="text-center mb-2">Create Account</h2>

            <div id="error-box" class="error-message"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-gold mb-1" style="width: 100%">Create Account</button>
                <p class="text-center" style="color: #666; font-size: 0.9rem; margin-top: 20px;">
                    Already have an account? <a href="login.html" class="signin-link">Sign In</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Verification Modal -->
    <div id="verify-modal" class="verification-modal">
        <div class="v-card">
            <div style="font-size: 48px; margin-bottom: 10px;">📧</div>
            <h3 class="mb-1" style="font-family: 'Playfair Display', serif; color: #8B0000; font-size: 24px;">Verify
                Email</h3>
            <p class="mb-2" style="color: #666;">We sent a 6-digit code to <br><strong id="display-email"
                    style="color: #4B0082;"></strong></p>

            <div id="verify-error" class="error-message"></div>

            <div class="form-group">
                <input type="text" id="verify-code" class="form-input text-center" placeholder="000000" maxlength="6"
                    style="font-size: 1.5rem; letter-spacing: 5px; font-weight: 700; color: #333;">
            </div>
            <div class="form-group"
                style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px; justify-content: center;">
                <input type="checkbox" id="remember" style="width: auto; cursor: pointer;" checked>
                <label for="remember" style="margin: 0; cursor: pointer; color: #555;">Remember me</label>
            </div>
            <button id="verify-btn" class="btn btn-gold" style="width: 100%">Verify & Login</button>
            <div
                style="margin-top: 20px; padding: 10px; background: #FFF8F0; border-radius: 8px; border: 1px dashed #D4AF37;">
                <p style="font-size: 0.9rem; color: #4B0082; font-weight: 600; margin: 0;">⚠️ IMPORTANT:</p>
                <p style="font-size: 0.85rem; color: #666; margin: 5px 0 0 0;">Please check your <strong>Spam</strong>
                    or <strong>Junk</strong> folder if you don't see the code in your inbox.</p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const registerForm = document.getElementById('register-form');
        const verifyModal = document.getElementById('verify-modal');
        const displayEmail = document.getElementById('display-email');
        const errorBox = document.getElementById('error-box');
        const verifyError = document.getElementById('verify-error');

        let currentEmail = '';

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorBox.style.display = 'none';

            try {
                const btn = e.target.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = 'Creating account...';
                btn.disabled = true;

                const res = await auth.register(name, email, password);

                currentEmail = email;
                displayEmail.innerText = email;
                verifyModal.style.display = 'flex';
            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.style.display = 'block';
            } finally {
                const btn = e.target.querySelector('button');
                btn.innerText = 'Create Account';
                btn.disabled = false;
            }
        });

        document.getElementById('verify-btn').addEventListener('click', async () => {
            const code = document.getElementById('verify-code').value;
            const remember = document.getElementById('remember').checked;
            verifyError.style.display = 'none';

            try {
                const res = await auth.verify(currentEmail, code, remember);
                alert('Verified successfully!');
                window.location.href = 'user-dashboard.html';
            } catch (err) {
                verifyError.innerText = err.message;
                verifyError.style.display = 'block';
            }
        });
    </script>

</body>

</html>
