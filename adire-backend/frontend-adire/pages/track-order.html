<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Eury Textiles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F3E5F5 0%, #D1C4E9 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            color: #4B0082;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .track-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(75, 0, 130, 0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #4B0082;
            font-weight: 600;
            font-size: 15px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #4B0082;
            box-shadow: 0 0 0 4px rgba(75, 0, 130, 0.1);
        }

        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            width: 100%;
            background: linear-gradient(135deg, #4B0082 0%, #6A0DAD 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(75, 0, 130, 0.3);
            animation: floatButton 2s ease-in-out infinite;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(75, 0, 130, 0.4);
            animation: none;
        }

        @keyframes floatButton {

            0%,
            100% {
                transform: translateY(0px);
                box-shadow: 0 6px 20px rgba(139, 0, 0, 0.3);
            }

            50% {
                transform: translateY(-3px);
                box-shadow: 0 10px 25px rgba(139, 0, 0, 0.35);
            }
        }

        .order-result {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(139, 0, 0, 0.1);
        }

        .order-result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .order-header {
            border-bottom: 2px solid #4B0082;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .order-id {
            font-size: 28px;
            color: #4B0082;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .order-date {
            color: #666;
            font-size: 14px;
        }

        .status-timeline {
            margin: 30px 0;
        }

        .timeline-item {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 19px;
            top: 40px;
            width: 2px;
            height: calc(100% + 10px);
            background: #E0E0E0;
        }

        .timeline-item.active::after {
            background: #4B0082;
        }

        .timeline-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #E0E0E0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            z-index: 1;
        }

        .timeline-item.active .timeline-dot {
            background: linear-gradient(135deg, #4B0082 0%, #6A0DAD 100%);
            box-shadow: 0 4px 15px rgba(75, 0, 130, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .timeline-content h3 {
            color: #4B0082;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .timeline-content p {
            color: #666;
            font-size: 14px;
        }

        .order-details {
            background: #F3E5F5;
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #E0E0E0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
            font-weight: 500;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .total-row {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #4B0082;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 700;
        }

        .total-row .detail-value {
            color: #4B0082;
        }

        .error-message {
            background: #FFE5E5;
            color: #4B0082;
            padding: 15px 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4B0082;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Track Your Order</h1>
            <p>Enter your order ID to track your Adire purchase</p>
        </div>

        <div class="track-card">
            <form id="track-form">
                <div class="form-group">
                    <label for="order-id">Order ID</label>
                    <input type="text" id="order-id" class="form-input" placeholder="e.g. 12345" required>
                </div>
                <button type="submit" class="btn">Track Order 📦</button>
            </form>
            <div id="error-message" class="error-message"></div>
        </div>

        <div id="order-result" class="order-result">
            <div class="order-header">
                <div class="order-id">Order #<span id="result-order-id"></span></div>
                <div class="order-date">Placed on <span id="result-date"></span></div>
            </div>

            <div class="status-timeline" id="timeline">
                <!-- Timeline will be populated by JavaScript -->
            </div>

            <div class="order-details">
                <h3 style="color: #4B0082; margin-bottom: 20px;">Order Details</h3>
                <div id="order-items"></div>
                <div class="total-row">
                    <span class="detail-label">Total Amount:</span>
                    <span class="detail-value">₦<span id="result-total"></span></span>
                </div>
            </div>

            <div
                style="margin-top: 30px; padding: 20px; background: #F3E5F5; border-radius: 12px; border-left: 4px solid #4B0082;">
                <h4 style="color: #4B0082; margin-bottom: 10px;">Delivery Information</h4>
                <p style="color: #666; margin-bottom: 8px;"><strong>Address:</strong> <span id="result-address"></span>
                </p>
                <p style="color: #666;"><strong>Phone:</strong> <span id="result-phone"></span></p>
            </div>

            <a href="user-dashboard.html" class="back-link">← Back to Dashboard</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const trackForm = document.getElementById('track-form');
        const errorMessage = document.getElementById('error-message');
        const orderResult = document.getElementById('order-result');

        trackForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const orderId = document.getElementById('order-id').value;
            errorMessage.classList.remove('show');
            orderResult.classList.remove('show');

            try {
                const btn = e.target.querySelector('button');
                btn.disabled = true;
                btn.textContent = 'Tracking...';

                const order = await api.get(`/track/${orderId}`);

                // Populate order details
                document.getElementById('result-order-id').textContent = order.id;
                document.getElementById('result-date').textContent = new Date(order.created_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('result-total').textContent = order.total.toLocaleString();
                document.getElementById('result-address').textContent = order.address || 'Not provided';
                document.getElementById('result-phone').textContent = order.phone || 'Not provided';

                // Populate items
                const items = JSON.parse(order.items);
                const itemsHTML = items.map(item => `
                    <div class="detail-row">
                        <span class="detail-label">${item.name} x${item.quantity}</span>
                        <span class="detail-value">₦${(item.price * item.quantity).toLocaleString()}</span>
                    </div>
                `).join('');
                document.getElementById('order-items').innerHTML = itemsHTML;

                // Create timeline based on status
                const timeline = createTimeline(order.status);
                document.getElementById('timeline').innerHTML = timeline;

                orderResult.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Track Order 📦';

            } catch (err) {
                errorMessage.textContent = err.message || 'Order not found. Please check your order ID and try again.';
                errorMessage.classList.add('show');
                const btn = e.target.querySelector('button');
                btn.disabled = false;
                btn.textContent = 'Track Order 📦';
            }
        });

        function createTimeline(status) {
            const stages = [
                { name: 'Order Placed', icon: '📝', desc: 'Your order has been received' },
                { name: 'Processing', icon: '⚙️', desc: 'We are preparing your items' },
                { name: 'Shipped', icon: '🚚', desc: 'Your order is on the way' },
                { name: 'Delivered', icon: '✅', desc: 'Order delivered successfully' }
            ];

            const statusIndex = {
                'Pending': 0,
                'Processing': 1,
                'Shipped': 2,
                'Delivered': 3
            };

            const currentIndex = statusIndex[status] || 0;

            return stages.map((stage, index) => {
                const isActive = index <= currentIndex;
                return `
                    <div class="timeline-item ${isActive ? 'active' : ''}">
                        <div class="timeline-dot">${stage.icon}</div>
                        <div class="timeline-content">
                            <h3>${stage.name}</h3>
                            <p>${stage.desc}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>

</html>
