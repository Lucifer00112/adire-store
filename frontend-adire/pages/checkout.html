<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .checkout-container {
            padding: 50px 0;
            min-height: 80vh;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav class="navbar glass-panel" style="margin: 0 5%; top: 10px; border-radius: 50px;">
        <div class="logo">
            <a href="../index.html"><img src="../images/logo.png" alt="Eury Textiles" height="50"></a>
        </div>
    </nav>

    <div class="container checkout-container">
        <h2 class="mb-2">Checkout</h2>
        <div class="checkout-grid">
            <div class="glass-panel" style="padding: 30px;">
                <h3 class="mb-2">Shipping Details</h3>
                <form id="checkout-form">
                    <div class="form-group">
                        <label for="address">Delivery Address</label>
                        <textarea id="address" class="form-input" rows="3" placeholder="Enter full delivery address"
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-input" placeholder="e.g. 08012345678" required>
                    </div>

                    <h3 class="mb-1 mt-2">Payment Method</h3>
                    <div class="glass-panel"
                        style="padding: 15px; border: 1px solid var(--accent-gold); display: flex; align-items: center; gap: 10px;">
                        <input type="radio" checked>
                        <div>
                            <strong>Cash on Delivery (COD)</strong>
                            <p style="font-size: 0.8rem; color: var(--text-muted)">Pay when your luxury Adire arrives.
                            </p>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-gold mt-2" style="width: 100%; padding: 15px;">Place Order
                        (₦<span id="btn-total">0</span>)</button>
                </form>
            </div>

            <div class="glass-panel" style="padding: 30px; height: fit-content;">
                <h3 class="mb-1">Your Order</h3>
                <div id="order-items" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
                    <!-- Summary items here -->
                </div>
                <div style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                    <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem;">
                        <span>Total</span>
                        <span id="final-total" style="color: var(--primary-indigo)">₦0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="success-overlay" class="success-overlay">
        <div>
            <h1 style="font-size: 5rem;">✨</h1>
            <h2 style="color: var(--primary-indigo)">Order Placed Successfully!</h2>
            <p class="mb-2">Thank you for choosing Eury Textiles. <br>We'll contact you shortly to confirm delivery.</p>
            <a href="../index.html" class="btn btn-gold">Keep Shopping</a>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = auth.getUser();
            if (!user) {
                alert('Please login to place an order.');
                window.location.href = 'login.html';
                return;
            }

            if (cart.items.length === 0) {
                window.location.href = '../index.html';
                return;
            }

            const total = cart.getTotal();
            document.getElementById('btn-total').innerText = total.toLocaleString();
            document.getElementById('final-total').innerText = `₦${total.toLocaleString()}`;

            const itemContainer = document.getElementById('order-items');
            cart.items.forEach(item => {
                const div = document.createElement('div');
                div.style.cssText = 'display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem;';
                div.innerHTML = `<span>${item.name} (x${item.quantity})</span> <span>₦${(item.price * item.quantity).toLocaleString()}</span>`;
                itemContainer.appendChild(div);
            });
        });

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.getUser();

            const orderData = {
                user_email: user.email,
                items: JSON.stringify(cart.items),
                total: cart.getTotal(),
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value
            };

            try {
                const btn = e.target.querySelector('button');
                btn.innerText = 'Processing...';
                btn.disabled = true;

                await api.post('/orders', orderData);

                cart.clear();
                document.getElementById('success-overlay').style.display = 'flex';
            } catch (err) {
                alert('Failed to place order: ' + err.message);
                btn.innerText = `Place Order (₦${cart.getTotal().toLocaleString()})`;
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
