<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .profile-container {
            padding: 50px 0;
            min-height: 90vh;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        .profile-nav {
            padding: 20px;
            height: fit-content;
        }

        .profile-nav ul {
            list-style: none;
        }

        .profile-nav li {
            margin-bottom: 10px;
        }

        .profile-nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            display: block;
            padding: 12px 20px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .profile-nav a:hover,
        .profile-nav a.active {
            background: rgba(75, 0, 130, 0.1);
            color: var(--primary-indigo);
        }

        .profile-content {
            padding: 40px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .success-banner {
            background: #E8F5E9;
            color: #2E7D32;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-banner {
            background: #FFEBEE;
            color: #C62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>

    <nav class="navbar glass-panel" style="margin: 0 5%; top: 10px; border-radius: 50px;">
        <div class="logo">
            <a href="../index.html"><img src="../images/logo.png" alt="Eury Textiles" height="50"></a>
        </div>
        <div class="auth-links">
            <a href="user-dashboard.html" class="btn btn-primary">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container profile-container">
        <h2 class="mb-2">Account Settings</h2>

        <div class="profile-grid">
            <div class="glass-panel profile-nav">
                <ul>
                    <li><a href="#" class="active" onclick="switchSection('personal-info', this)">Personal
                            Information</a></li>
                    <li><a href="#" onclick="switchSection('address-book', this)">Address Book</a></li>
                    <li><a href="#" onclick="switchSection('security', this)">Security</a></li>
                    <li>
                        <hr style="margin: 10px 0; border: none; border-top: 1px solid var(--border-color);">
                    </li>
                    <li><a href="#" onclick="auth.logout()" style="color: #c62828;">Logout</a></li>
                </ul>
            </div>

            <div class="glass-panel profile-content">
                <div id="success-msg" class="success-banner"></div>
                <div id="error-msg" class="error-banner"></div>

                <!-- Personal Info Section -->
                <div id="personal-info" class="form-section active">
                    <h3 class="mb-2">Personal Information</h3>
                    <form id="profile-form">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="p-name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="p-email" class="form-input" disabled
                                style="background: #f5f5f5; cursor: not-allowed;">
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Email cannot be
                                changed.</p>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="p-phone" class="form-input">
                        </div>
                        <button type="submit" class="btn btn-primary mt-1">Save Changes</button>
                    </form>
                </div>

                <!-- Address Book Section -->
                <div id="address-book" class="form-section">
                    <h3 class="mb-2">Default Shipping Address</h3>
                    <p class="mb-2" style="color: var(--text-muted);">Save your address for a faster checkout
                        experience.</p>
                    <form id="address-form">
                        <div class="form-group">
                            <label>Delivery Address</label>
                            <textarea id="p-address" class="form-input" rows="4"
                                placeholder="Enter your full street address, city, and state"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary mt-1">Save Address</button>
                    </form>
                </div>

                <!-- Security Section -->
                <div id="security" class="form-section">
                    <h3 class="mb-2">Change Password</h3>
                    <form id="password-form">
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password" id="old-pass" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="new-pass" class="form-input" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirm-pass" class="form-input" required>
                        </div>
                        <button type="submit" class="btn btn-primary mt-1">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Load latest profile from DB
            try {
                const profile = await api.get(`/user/profile?email=${user.email}`);
                document.getElementById('p-name').value = profile.name || '';
                document.getElementById('p-email').value = profile.email || '';
                document.getElementById('p-phone').value = profile.phone || '';
                document.getElementById('p-address').value = profile.address || '';
            } catch (err) {
                console.error('Failed to load profile', err);
            }
        });

        function switchSection(sectionId, element) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.profile-nav a').forEach(a => a.classList.remove('active'));

            document.getElementById(sectionId).classList.add('active');
            element.classList.add('active');
            hideMessages();
        }

        function showMessage(msg, isError = false) {
            const target = isError ? 'error-msg' : 'success-msg';
            const el = document.getElementById(target);
            el.innerText = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function hideMessages() {
            document.getElementById('success-msg').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';
        }

        // Profile Update
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await auth.updateProfile({
                    name: document.getElementById('p-name').value,
                    phone: document.getElementById('p-phone').value,
                    address: document.getElementById('p-address').value
                });
                showMessage('Profile updated successfully!');
            } catch (err) {
                showMessage(err.message, true);
            }
        });

        // Address Update (shares the same data field)
        document.getElementById('address-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await auth.updateProfile({
                    name: document.getElementById('p-name').value,
                    phone: document.getElementById('p-phone').value,
                    address: document.getElementById('p-address').value
                });
                showMessage('Address saved successfully!');
            } catch (err) {
                showMessage(err.message, true);
            }
        });

        // Password Change
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('new-pass').value;
            const confirmPass = document.getElementById('confirm-pass').value;

            if (newPass !== confirmPass) {
                showMessage('New passwords do not match!', true);
                return;
            }

            try {
                await auth.changePassword(newPass);
                showMessage('Password changed successfully!');
                e.target.reset();
            } catch (err) {
                showMessage(err.message, true);
            }
        });
    </script>
</body>

</html>
