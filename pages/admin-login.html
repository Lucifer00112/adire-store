<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--primary-indigo-dark);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border: 2px solid var(--accent-gold);
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card glass-panel">
            <h2 class="text-center mb-1" style="color: var(--accent-gold)">Admin Portal</h2>
            <p class="text-center mb-2" style="color: white; opacity: 0.8;">Internal access only</p>

            <div id="error-box" class="error-message"></div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label for="email" style="color: white">Admin Email</label>
                    <input type="email" id="email" class="form-input" placeholder="admin@eurytextiles.com" required>
                </div>
                <div class="form-group">
                    <label for="password" style="color: white">Security Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn btn-gold" style="width: 100%; padding: 15px;">Access Dashboard</button>
            </form>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script>
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');
            const btn = e.target.querySelector('button');

            errorBox.style.display = 'none';

            try {
                btn.innerText = 'Verifying...';
                btn.disabled = true;

                // 1. Authenticate with Supabase
                const res = await auth.login(email, password);

                // 2. Fetch profile to check role
                const profile = await api.get('/user/profile');

                if (profile && profile.role === 'admin') {
                    // Success: Redirect to dashboard
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Unauthorized: Sign out and show error
                    await auth.logout();
                    throw new Error('Access Denied: You do not have administrator privileges.');
                }

            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.style.display = 'block';
                btn.innerText = 'Access Dashboard';
                btn.disabled = false;
            }
        });
    </script>

</body>

</html>
