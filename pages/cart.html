<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .cart-container {
            padding: 50px 0;
            min-height: 80vh;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            margin-bottom: 20px;
            background: white;
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-details {
            flex: 1;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-summary {
            padding: 30px;
            position: sticky;
            top: 100px;
        }

        .empty-cart {
            text-align: center;
            padding: 100px 0;
        }
    </style>
</head>

<body>

    <nav class="navbar glass-panel" style="margin: 0 5%; top: 10px; border-radius: 50px;">
        <div class="logo">
            <a href="../index.html"><img src="../images/logo.png" alt="Eury Textiles" height="50"></a>
        </div>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
        </ul>
        <div class="auth-links">
            <a href="user-dashboard.html" class="btn btn-primary">Dashboard</a>
        </div>
    </nav>

    <div class="container cart-container">
        <h2 class="mb-2">Your Shopping Cart</h2>

        <div style="display: grid; grid-template-columns: 1fr 350px; gap: 40px;" id="cart-layout">
            <div id="cart-list">
                <!-- Items will be injected here -->
            </div>

            <div class="cart-summary glass-panel">
                <h3 class="mb-1">Order Summary</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Subtotal</span>
                    <span id="subtotal">₦0</span>
                </div>
                <div
                    style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 700; border-top: 1px solid var(--border-color); padding-top: 1rem;">
                    <span>Total</span>
                    <span id="total" style="color: var(--primary-indigo)">₦0</span>
                </div>
                <a href="checkout.html" class="btn btn-gold" style="width: 100%">Proceed to Checkout</a>
                <p class="mt-1 text-center" style="font-size: 0.8rem; color: var(--text-muted)">Cash on Delivery
                    available</p>
            </div>
        </div>

        <div id="empty-state" class="empty-cart" style="display: none;">
            <h2>Your cart is empty</h2>
            <p class="mb-2">Discover our beautiful Adire collection</p>
            <a href="../index.html" class="btn btn-primary">Start Shopping</a>
        </div>
    </div>

    <script src="../js/cart.js"></script>
    <script>
        function renderCart() {
            const list = document.getElementById('cart-list');
            const layout = document.getElementById('cart-layout');
            const emptyState = document.getElementById('empty-state');

            if (cart.items.length === 0) {
                layout.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            layout.style.display = 'grid';
            emptyState.style.display = 'none';
            list.innerHTML = '';

            cart.items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'cart-item glass-panel';
                el.innerHTML = `
                <img src="${item.image_url || '../img/placeholder.jpg'}" alt="${item.name}">
                <div class="cart-details">
                    <h4>${item.name}</h4>
                    <p class="text-muted" style="font-size: 0.8rem">${item.category || 'Fabric'}</p>
                    <p style="font-weight: 600; color: var(--primary-indigo)">₦${item.price.toLocaleString()}</p>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                    <span>${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                </div>
                <button onclick="cart.removeItem('${item.id}')" style="border:none; background:none; cursor:pointer; color:#d32f2f">🗑️</button>
            `;
                list.appendChild(el);
            });

            document.getElementById('subtotal').innerText = `₦${cart.getTotal().toLocaleString()}`;
            document.getElementById('total').innerText = `₦${cart.getTotal().toLocaleString()}`;
        }

        function updateQty(id, delta) {
            cart.updateQuantity(id, delta);
        }

        window.addEventListener('cartUpdated', renderCart);
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>

</body>

</html>
