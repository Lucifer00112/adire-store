<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .forgot-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FAEBD7 100%);
            font-family: 'Inter', sans-serif;
        }

        .forgot-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(75, 0, 130, 0.1);
        }

        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #4B0082 !important;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #4B0082;
            background: #FFF8F0;
        }

        .btn-gold {
            background: linear-gradient(135deg, #4B0082 0%, #6A0DAD 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(75, 0, 130, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(75, 0, 130, 0.4);
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        .error {
            background: #ffebee;
            color: #d32f2f;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="forgot-container">
        <div class="forgot-card">
            <div class="logo-box">
                <h1
                    style="font-family: 'Playfair Display', serif; font-size: 30px; color: #D4AF37; font-style: italic; margin-bottom: 5px;">
                    Eury Textiles</h1>
            </div>
            <h2>Reset Password</h2>
            <p style="color: #666; font-size: 14px; text-align: center; margin-bottom: 30px;">
                Enter your email address and we'll send you a link to reset your password.
            </p>

            <div id="msg-box" class="message"></div>

            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="yourname@example.com" required>
                </div>
                <button type="submit" class="btn btn-gold">Send Reset Link</button>
            </form>

            <p style="text-align: center; margin-top: 25px; font-size: 14px;">
                <a href="login.html" style="color: #4B0082; text-decoration: none; font-weight: 600;">← Back to
                    Login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const form = document.getElementById('forgot-form');
        const msgBox = document.getElementById('msg-box');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const btn = form.querySelector('button');

            msgBox.style.display = 'none';
            msgBox.className = 'message';

            try {
                btn.innerText = 'Sending...';
                btn.disabled = true;

                await auth.resetPassword(email);

                msgBox.innerText = 'Reset link sent! Please check your email inbox (and spam folder).';
                msgBox.classList.add('success');
                msgBox.style.display = 'block';
                form.style.display = 'none';

            } catch (err) {
                msgBox.innerText = err.message || 'Error occurred';
                msgBox.classList.add('error');
                msgBox.style.display = 'block';
                btn.innerText = 'Send Reset Link';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
