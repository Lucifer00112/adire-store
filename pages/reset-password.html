<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FAEBD7 100%);
            font-family: 'Inter', sans-serif;
        }

        .reset-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(75, 0, 130, 0.1);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #4B0082 !important;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-gold {
            background: linear-gradient(135deg, #4B0082 0%, #6A0DAD 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .error {
            background: #ffebee;
            color: #d32f2f;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <div class="reset-card">
            <h2>Set New Password</h2>
            <div id="msg-box" class="message"></div>

            <form id="reset-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" class="form-input" minlength="6"
                        placeholder="At least 6 characters" required>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" class="form-input" placeholder="Confirm your new password"
                        required>
                </div>
                <button type="submit" class="btn btn-gold">Update Password</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const form = document.getElementById('reset-form');
        const msgBox = document.getElementById('msg-box');

        // Supabase sends the access token in a URL fragment (hash)
        // when a reset link is clicked.
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.location.hash) {
                msgBox.innerText = 'Invalid or expired reset link. Please request a new one.';
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
                form.style.display = 'none';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn = form.querySelector('button');

            if (password !== confirm) {
                msgBox.innerText = 'Passwords do not match!';
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
                return;
            }

            try {
                btn.innerText = 'Updating...';
                btn.disabled = true;

                await auth.changePassword(password);

                msgBox.innerText = 'Password updated successfully! You can now log in.';
                msgBox.className = 'message success';
                msgBox.style.display = 'block';
                form.style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                msgBox.innerText = err.message || 'Error occurred';
                msgBox.className = 'message error';
                msgBox.style.display = 'block';
                btn.innerText = 'Update Password';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
