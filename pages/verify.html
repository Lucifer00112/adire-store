<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Eury Textiles</title>
    <link rel="stylesheet" href="../css/index.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .verify-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FAEBD7 100%);
            font-family: 'Inter', sans-serif;
        }

        .verify-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(75, 0, 130, 0.1);
            text-align: center;
        }

        .icon-box {
            font-size: 60px;
            margin-bottom: 20px;
            color: #4B0082;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #4B0082 !important;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .code-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 24px;
            letter-spacing: 15px;
            font-weight: 700;
            text-align: center;
            transition: all 0.3s;
            color: #333;
        }

        .code-input:focus {
            outline: none;
            border-color: #4B0082;
            background: #FFF8F0;
            box-shadow: 0 0 0 4px rgba(75, 0, 130, 0.1);
        }

        .btn-gold {
            background: linear-gradient(135deg, #4B0082 0%, #6A0DAD 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(75, 0, 130, 0.3);
            width: 100%;
            margin-bottom: 20px;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(75, 0, 130, 0.4);
        }

        .btn-gold:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .resend-box {
            font-size: 14px;
            color: #666;
        }

        .resend-link {
            color: #4B0082;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #999;
            cursor: not-allowed;
            text-decoration: none;
        }

        .error-message {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .success-message {
            color: #2e7d32;
            background: #e8f5e9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .info-panel {
            margin-top: 30px;
            padding: 20px;
            background: #FFF8F0;
            border-radius: 12px;
            border: 1px dashed #D4AF37;
            text-align: left;
        }

        .info-panel h4 {
            font-size: 14px;
            color: #4B0082;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>

    <div class="verify-container">
        <div class="verify-card">
            <div class="icon-box">📧</div>
            <h2>Verify Your Email</h2>
            <p>We've sent a 6-digit activation code to <br><strong id="user-email" style="color: #4B0082;">---</strong>
            </p>

            <div id="error-box" class="error-message"></div>
            <div id="success-box" class="success-message"></div>

            <form id="verify-form">
                <div class="form-group">
                    <input type="text" id="verify-code" class="code-input" placeholder="000000" maxlength="6" required
                        autocomplete="one-time-code">
                </div>
                <button type="submit" id="submit-btn" class="btn-gold">Activate Account</button>
            </form>

            <div class="resend-box">
                Didn't receive the code? <br>
                <span id="resend-timer-box">
                    You can resend in <span id="timer">60</span>s
                </span>
                <a id="resend-link" class="resend-link disabled" style="display: none;">Resend Code</a>
            </div>

            <div class="info-panel">
                <h4><span>⚠️</span> Pro-Tip</h4>
                <p style="font-size: 13px; margin-bottom: 0;">Please check your <strong>Spam</strong> or
                    <strong>Junk</strong> folder if you don't see the email in your main inbox within a minute.</p>
            </div>

            <p style="margin-top: 30px; font-size: 14px;">
                <a href="login.html" style="color: #666; text-decoration: none;">← Back to Sign In</a>
            </p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const userEmailSpan = document.getElementById('user-email');
        const verifyForm = document.getElementById('verify-form');
        const verifyCodeInput = document.getElementById('verify-code');
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');
        const submitBtn = document.getElementById('submit-btn');
        const resendLink = document.getElementById('resend-link');
        const resendTimerBox = document.getElementById('resend-timer-box');
        const timerSpan = document.getElementById('timer');

        if (!email) {
            window.location.href = 'login.html';
        } else {
            userEmailSpan.innerText = email;
        }

        // Resend Timer Logic
        let timeLeft = 60;
        let timerId = null;

        function startTimer() {
            timeLeft = 60;
            resendLink.style.display = 'none';
            resendTimerBox.style.display = 'inline';
            timerSpan.innerText = timeLeft;

            if (timerId) clearInterval(timerId);

            timerId = setInterval(() => {
                timeLeft--;
                timerSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    resendTimerBox.style.display = 'none';
                    resendLink.style.display = 'inline';
                    resendLink.classList.remove('disabled');
                }
            }, 1000);
        }

        startTimer();

        resendLink.addEventListener('click', async () => {
            if (timeLeft > 0) return;

            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            try {
                const res = await auth.resendVerificationCode(email);
                successBox.innerText = res.message;
                successBox.style.display = 'block';
                startTimer();
            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.style.display = 'block';
            }
        });

        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = verifyCodeInput.value.trim();

            if (code.length !== 6) {
                errorBox.innerText = 'Please enter a valid 6-digit code';
                errorBox.style.display = 'block';
                return;
            }

            errorBox.style.display = 'none';
            successBox.style.display = 'none';
            submitBtn.innerText = 'Verifying...';
            submitBtn.disabled = true;

            try {
                // By default we remember the user if they verify
                await auth.verify(email, code, true);
                successBox.innerText = 'Account activated successfully! Redirecting...';
                successBox.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'user-dashboard.html';
                }, 2000);
            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.style.display = 'block';
                submitBtn.innerText = 'Activate Account';
                submitBtn.disabled = false;
            }
        });

        // Auto-focus and auto-submit logic
        verifyCodeInput.focus();
        verifyCodeInput.addEventListener('input', (e) => {
            if (e.target.value.length === 6) {
                verifyForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>

</html>
